name: Sync to Gitee

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Gitee
        uses: Yikun/hub-mirror-action@v1.4
        with:
          src: github/Drlee00
          dst: gitee/Drlee00
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "financial-services"
          force_update: true
          account_type: user
          clone_style: https
