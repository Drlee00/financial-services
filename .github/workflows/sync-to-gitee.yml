name: Sync to Gitee

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Mirror to Gitee
        run: |
          git remote add gitee https://Drlee00:${{ secrets.GITEE_TOKEN }}@gitee.com/Drlee00/financial-services.git
          git push -f gitee main:main
